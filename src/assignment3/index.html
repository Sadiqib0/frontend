<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<main class="calculator" id="calculator">
    <div class="display">
        <div class="history" data-history></div>
        <div class="current" data-current>0</div>
    </div>

    <div class="keys">
        <button class="key key--util" data-action="clear">C</button>
        <button class="key key--util" data-action="delete">DEL</button>
        <button class="key key--util" data-action="percent">%</button>
        <button class="key key--op" data-operator="/">÷</button>

        <button class="key" data-number="7">7</button>
        <button class="key" data-number="8">8</button>
        <button class="key" data-number="9">9</button>
        <button class="key key--op" data-operator="*">×</button>

        <button class="key" data-number="4">4</button>
        <button class="key" data-number="5">5</button>
        <button class="key" data-number="6">6</button>
        <button class="key key--op" data-operator="-">−</button>

        <button class="key" data-number="1">1</button>
        <button class="key" data-number="2">2</button>
        <button class="key" data-number="3">3</button>
        <button class="key key--op" data-operator="+">+</button>

        <button class="key key--zero" data-number="0">0</button>
        <button class="key" data-number=".">.</button>
        <button class="key key--util" data-action="toggle-sign">+/−</button>
        <button class="key key--equals" data-action="equals">=</button>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
