<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educlass - Modern Solution for Education</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <header class="navbar">
        <div class="container">
            <img src="Navigation%20Bar.svg" alt="Educlass" class="nav-svg">
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <img src="Vector%20189.svg" alt="" class="vector-bg" aria-hidden="true">
        <div class="container hero-container">
            <div class="hero-left">
                <img src="Heading.svg" alt="Modern Solution for Education" class="heading-svg">
            </div>
            <div class="hero-right">
                <img src="Dashboard.svg" alt="Educlass Dashboard Preview" class="dashboard-svg">
            </div>
        </div>
    </section>

    <!-- About / Features Section -->
    <section class="about">
        <div class="container about-container">
            <img src="About%20Us.svg" alt="Empower students and teachers with Educlass" class="about-svg">
        </div>
    </section>

    <!-- Features Section -->
    <section class="features">
        <div class="container features-container">

            <!-- Section Title -->
            <div class="features-title">
                <img src="Title%20&%20Content1.svg" alt="Features Title" class="features-title-svg">
            </div>

            <!-- Feature Cards -->
            <div class="features-cards">
                <div class="feature-card">
                    <img src="Content%2001.svg" alt="Feature 01" class="feature-card-svg">
                </div>
                <div class="feature-card">
                    <img src="Content%2002.svg" alt="Feature 02" class="feature-card-svg">
                </div>
                <div class="feature-card">
                    <img src="Content%2003.svg" alt="Feature 03" class="feature-card-svg">
                </div>
            </div>

        </div>
    </section>

    <!-- Testimonial Section -->
    <section class="testimonial">
        <div class="testimonial-header">
            <div class="container">
                <div class="testimonial-title">
                    <img src="Title%20&%20Content2.svg" alt="Testimonial Title" class="testimonial-title-svg">
                </div>
            </div>
        </div>

        <div class="testimonial-body">
            <div class="container testimonial-container">
                <div class="testimonial-main">
                    <img src="Main%20Content.svg" alt="Testimonials" class="testimonial-main-svg">
                </div>

                <div class="testimonial-action">
                    <a href="#" class="btn-view-more">View More</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Pricing Section -->
    <section class="pricing">
        <div class="container pricing-container">

            <!-- Section Title -->
            <div class="pricing-title">
                <img src="Title%20&%20Content3.svg" alt="Pricing Title" class="pricing-title-svg">
            </div>

            <!-- Pricing Cards -->
            <div class="pricing-cards">
                <img src="Pricing%20Card.svg" alt="Pricing Plans" class="pricing-card-svg">
            </div>

        </div>
    </section>

    <!-- CTA Section -->
    <div class="cta-footer-group">

        <section class="cta">
            <div class="container cta-container">
                <div class="cta-left">
                    <img src="Mask%20group.svg" alt="Dashboard" class="cta-mockup-svg">
                </div>
                <div class="cta-right">
                    <img src="Content04.svg" alt="Content" class="cta-content-svg">
                </div>
            </div>
        </section>

    <!-- Footer -->
        <footer class="footer">
            <div class="container footer-container">
                <img src="Footer.svg" alt="Footer" class="footer-svg">
            </div>
        </footer>

    </div>

</body>
</html>
