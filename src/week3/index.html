<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body>
<div class="mainContainer">
    <div class="textWrapper">
        <div class="apparelLogo">
            <div class="circleLogo"></div>
            <span>BASE APPAREL</span>
        </div>
        <div class="comingSoon">
            <span>WE'RE</span>
            <h2>COMING SOON</h2>
        </div>
        <div class="fellowShoppers">
            <h1>Hello fellow shoppers!
                We're currently building our new fashion store.
                Add your email below to stay up-to-date
                with announcements and our launch deals.
            </h1>
        </div>
        <div class="inputGroup">
            <input placeholder="Email Address" type="text">
            <button type ="button">></button>
        </div>
        <div class="viewDemoWrapper">
            <button class="heroDemoBtn">
                <img src="../../../../IdeaProjects/moniepointDreamDev-Frontend/Assignment1/viewDemoButton.svg" alt="View Demo">
            </button>
        </div>
    </div>
    <div class="imageBox">
        <img src="Bitmap.png" alt="Picture of a Woman">
    </div>
</div>
</body>
</html>
